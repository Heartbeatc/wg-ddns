name: Release Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Decide release channel
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            PRERELEASE=false
            NAME="${TAG}"
          else
            TAG="edge"
            PRERELEASE=true
            NAME="edge"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/wgstack ./cmd/wgstack
          tar -czf "dist/wgstack_${{ steps.channel.outputs.tag }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" -C dist wgstack

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          name: ${{ steps.channel.outputs.name }}
          prerelease: ${{ steps.channel.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.channel.outputs.prerelease != 'true' }}
          files: dist/wgstack_${{ steps.channel.outputs.tag }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
